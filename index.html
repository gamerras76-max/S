<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background-color: #1e1e1e;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .user-msg {
            background-color: #0b93f6;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            background-color: #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }
        .input-area {
            display: flex;
            padding: 12px;
            background-color: #1e1e1e;
            border-top: 1px solid #333;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            background-color: #2a2a2a;
            color: white;
            outline: none;
            font-size: 16px;
        }
        button {
            background-color: #0b93f6;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="header">🤖 Master AI Tool</div>

    <div class="chat-box" id="chatBox">
        <div class="message ai-msg">Hello! Main aapka personal AI hoon. Aaj hum is tool mein kya naya add karenge?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Message your AI...">
        <button onclick="sendMessage()">➤</button>
    </div>

    <script>
        function sendMessage() {
            let inputField = document.getElementById("userInput");
            let chatBox = document.getElementById("chatBox");
            let messageText = inputField.value.trim();

            if (messageText !== "") {
                // User message UI mein add karna
                let userMsgDiv = document.createElement("div");
                userMsgDiv.className = "message user-msg";
                userMsgDiv.innerText = messageText;
                chatBox.appendChild(userMsgDiv);
                
                inputField.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;

                // AI ka Placeholder Reply (Yahan actual API connect hogi)
                setTimeout(() => {
                    let aiMsgDiv = document.createElement("div");
                    aiMsgDiv.className = "message ai-msg";
                    aiMsgDiv.innerText = "Abhi main sirf ek design hoon. Mujhe API se connect karein taaki main aapke sawalon ka jawab de sakun!";
                    chatBox.appendChild(aiMsgDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 800);
            }
        }
    </script>
</body>
</html>
